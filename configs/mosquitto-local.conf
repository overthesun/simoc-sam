# Mosquitto MQTT Broker Configuration
# This configuration file is deployed to /etc/mosquitto/conf.d/ by simoc-sam.py
# to enable local MQTT broker functionality on each Raspberry Pi.

# =============================================================================
# Network Listener Configuration
# =============================================================================
# Listen on localhost only -- all local processes (sensors, displays, siobridge)
# communicate through this local broker.
listener 1883 127.0.0.1

# =============================================================================
# Authentication
# =============================================================================
# Allow anonymous connections for simplicity in local/mesh deployments.
# For production or internet-exposed deployments, consider enabling auth:
#   password_file /etc/mosquitto/passwd
#   allow_anonymous false
allow_anonymous true

# =============================================================================
# Persistence Configuration
# =============================================================================
# Persistence disabled for local-only real-time streaming.
persistence false

# Set this to control how often to write persistence db to disk when
# persistence is enabled.
# autosave_interval 300

# =============================================================================
# Logging Configuration
# =============================================================================
# Log to file for easier debugging
log_dest file /var/log/mosquitto/mosquitto.log

# Log types: error, warning, notice, information, subscribe, unsubscribe, all
# Using error/warning/notice for production - excludes verbose subscribe events
# and informational messages to reduce log size and SD card wear
log_type error warning notice

# Log timestamp format
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
