# Display configuration

[mockdisplay]
name = "Mock Display"
description = "A mock display that prints to console."
module = "simoc_sam.displays.mockdisplay"
width = 128
height = 64
i2c_address = 0x00

[ssd1306]
name = "SSD1306"
description = "Monochrome 128x64 OLED display"
module = "simoc_sam.displays.ssd1306"
width = 128
height = 64
i2c_address = 0x3D
reset_pin = "D4"

[ssd1327]
name = "SSD1327"
description = "Grayscale 128x128 OLED display"
module = "simoc_sam.displays.ssd1327"
width = 128
height = 128
i2c_address = 0x3D
